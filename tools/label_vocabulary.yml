version: 1
description: >
  Controlled vocabulary used by the ALPS label audit. Labels are intentionally
  conservative: aliases are safe mechanical replacements, broad labels need
  policy review, and review labels should be checked before mass editing.

type_labels:
  - dynamic / data structure
  - online
  - running time
  - approximation
  - streaming
  - game theory / mechanism design
  - differential privacy
  - survey

prior_label: prior / related work

aliases:
  matching / allocation: allocation / matching
  routing: routing / TSP

broad_labels:
  online: Too common to be useful as a topic by itself; keep as a type label only if the UI treats it separately.
  learning: Too generic for this collection; replace with a more specific problem/domain label.
  graph problems: Broad umbrella; useful only if paired with a more specific graph/domain label where possible.

review_labels:
  MDP: Check whether this should be merged into control/optimization or kept as a small topic.
  SDP: Singleton and acronym-heavy; check whether a broader optimization label is better.
  convex body chasing: Singleton but likely legitimate.
  convex optimization: Singleton; check relationship with smoothed/online optimization papers.
  hashing: Singleton; check whether it belongs under streaming/data structures.
  knapsack: Singleton; check whether it belongs under packing.
  list labeling: Singleton but likely legitimate data-structure topic.
  ms: Unknown abbreviation; likely incorrect.
  robustness: Too generic as a standalone label.
  submodular maximization: Singleton; check whether it belongs under approximation/optimization.
  voting: Singleton; check whether it should be social choice.

